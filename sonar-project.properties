# SonarCloud configuration for SportStreamLive-Front
# If your project key in SonarCloud differs, you can update it here.
sonar.projectKey=sportstreamlive-frontend
sonar.organization=Krayangel
sonar.host.url=https://sonarcloud.io

# Paths to the source code and tests
sonar.sources=src
sonar.tests=src

# Inclusions and exclusions for sources and tests
sonar.exclusions=src/**/*.test.js, src/**/*.test.jsx, src/setupTests.js, src/reportWebVitals.js, src/config.js
sonar.test.inclusions=src/**/*.test.js, src/**/*.test.jsx

# Path to the unit tests coverage report generated by Jest
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Source code encoding
sonar.sourceEncoding=UTF-8
